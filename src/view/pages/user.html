<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta | IFF</title>
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/user.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div id="navbar-placeholder"></div>

  <main class="dashboard-container">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="showSection('section-perfil', this)">👤 Meus Dados</button>
        
        <div id="menu-admin" style="display: none;">
          <p class="menu-label">Administração</p>
          <button class="nav-btn" onclick="showSection('section-cadastro-jogo', this)">🎮 Cadastrar Jogo</button>
          <button class="nav-btn" onclick="showSection('section-curadoria', this)">📋 Analisar Sugestões</button>
        </div>
      </nav>
    </aside>

    <div class="account-page">
      <div id="status" class="status" aria-live="polite"></div>

      <section id="section-perfil" class="account-card section-content">
        <div class="account-header">
          <h1>Configurações da conta</h1>
          <p class="account-subtitle">Atualize seus dados cadastrais.</p>
        </div>

        <form id="formConta" class="account-form">
          <div class="form-row">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Seu nome" required />
          </div>
          <div class="form-row">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com" required />
          </div>

          <div class="divider"></div>
          <h2 class="section-title">Alterar senha (opcional)</h2>

          <div class="form-row">
            <label for="senhaAtual">Senha atual</label>
            <input id="senhaAtual" type="password" placeholder="Digite a senha atual" />
          </div>
          <div class="form-row">
            <label for="novaSenha">Nova senha</label>
            <input id="novaSenha" type="password" placeholder="Mínimo 6 caracteres" />
          </div>
          <div class="form-row">
            <label for="confirmarNovaSenha">Confirmar nova senha</label>
            <input id="confirmarNovaSenha" type="password" placeholder="Repita a nova senha" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar alterações</button>
          </div>
        </form>
      </section>

      <section id="section-cadastro-jogo" class="account-card section-content" style="display: none;">
        <h2 class="section-title">Cadastrar Novo Jogo</h2>
        <form id="formCadastroJogo" class="account-form">
          <div class="form-row">
            <label for="nome_jogo">Nome do Jogo *</label>
            <input id="nome_jogo" type="text" required />
          </div>
          <div class="form-row">
            <label for="link_acesso">Link de Acesso *</label>
            <input id="link_acesso" type="url" required />
          </div>
          <div class="form-row">
            <label for="linkimagem">Nome da Imagem</label>
            <input id="linkimagem" type="text" />
          </div>
          <div class="form-row">
            <label for="idioma">Idioma</label>
            <input id="idioma" type="text" />
          </div>
          <div class="form-row">
            <label for="interacao">Interação</label>
            <select id="interacao">
              <option value="Single Player">Single Player</option>
              <option value="Multiplayer">Multiplayer</option>
            </select>
          </div>
          <div class="form-row">
            <label for="licensa">Licença</label>
            <input id="licensa" type="text" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Cadastrar Jogo</button>
          </div>
        </form>
      </section>

      <section id="section-curadoria" class="account-card section-content" style="display: none;">
        <h2 class="section-title">Sugestões de Jogos</h2>
        <div class="table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Jogo</th>
                <th>Link</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-sugestoes"></tbody>
          </table>
        </div>
      </section>

    </div>
  </main>

  <script src="/js/navbar.js"></script>
  <script src="/js/user.js"></script>
</body>

</html>
